    <style>
      body { background: var(--bg); }
      .success-page {
        min-height: 100vh;
        padding: 118px 0 64px;
        display: flex;
        align-items: center;
      }
      .success-card {
        width: min(760px, calc(100% - 40px));
        margin: 0 auto;
        padding: 32px;
        border-radius: 24px;
        background: #f7e9dc;
        border: 1px solid rgba(17, 17, 17, 0.08);
        display: grid;
        gap: 18px;
      }
      .success-title {
        margin: 0;
        font-family: "Hagrid Trial", "Montserrat", sans-serif;
        font-size: clamp(2rem, 6vw, 3.3rem);
        line-height: 1.05;
      }
      .success-copy,
      .success-status {
        margin: 0;
        line-height: 1.6;
        color: rgba(17, 17, 17, 0.74);
      }
      .success-actions {
        display: flex;
        flex-direction: column;
        gap: 12px;
      }
      .success-link {
        color: var(--accent);
        font-weight: 700;
        text-decoration: none;
      }
    </style>
  </head>
  <body>
    <!-- Google Tag Manager (noscript) -->
    <noscript><iframe src="https://www.googletagmanager.com/ns.html?id=GTM-KNJGK78M"
    height="0" width="0" style="display:none;visibility:hidden"></iframe></noscript>
    <!-- End Google Tag Manager (noscript) -->
    <header class="site-header">
      <div class="container header-shell">
        <a class="brand" id="brandLink" href="index.html" aria-label="Norys Startseite">
          <img class="brand__logo" src="LogoTransparent.png" alt="Norys Logo" />
          <span class="brand__name">Norys</span>
        </a>
        <button class="lang-pill" id="languageToggle" type="button" aria-label="Sprache wählen">
          <i class="fa-solid fa-globe" aria-hidden="true"></i>
          <span id="languageLabel">Deutsch</span>
        </button>
      </div>
    </header>

    <main class="success-page">
      <section class="success-card">
        <h1 class="success-title" id="successTitle">Deine Zahlung wurde bestätigt.</h1>
        <p class="success-copy" id="successCopy">Wir prüfen gerade deine Bestellung und bereiten dein eBook vor.</p>
        <p class="success-status" id="successStatus">Einen Moment bitte...</p>
        <div class="success-actions" id="successActions"></div>
      </section>
    </main>

    <script src="assets/tracker.js"></script>
    <script>
      const LANGUAGE_STORAGE_KEY = "norysLanguage";
      const UI_TEXT = {
        de: {
          pageTitle: "Zahlung bestätigt | Norys",
          metaDescription: "Deine Zahlung wurde bestätigt und dein Norys eBook wird zum Download vorbereitet.",
          ogLocale: "de_DE",
          ogTitle: "Zahlung bestätigt | Norys",
          ogDescription: "Deine Norys Zahlung wurde bestätigt.",
          brandAriaLabel: "Norys Startseite",
          languageButtonAriaLabel: "Sprache wechseln",
          languageLabel: "Deutsch",
          title: "Deine Zahlung wurde bestätigt.",
          preparing: "Wir prüfen gerade deine Bestellung und bereiten dein eBook vor.",
          pleaseWait: "Einen Moment bitte...",
          missingSession: "Die Stripe-Session fehlt. Bitte gehe zur Ergebnisseite zurück und starte den Kauf erneut.",
          notPaidYet: "Deine Zahlung ist noch nicht bestätigt. Bitte aktualisiere die Seite in einem Moment erneut.",
          purchaseDone: "Dein Kauf ist erfolgreich abgeschlossen.",
          purchaseDoneFor: 'Dein Kauf für "{productName}" ist erfolgreich abgeschlossen.',
          downloadReady: "Dein eBook steht jetzt zum Download bereit.",
          downloadButton: "eBook herunterladen",
          backLink: "Zurück zur Ergebnisseite",
          fetchError: "Es ist ein Fehler beim Abrufen deiner Bestellung aufgetreten.",
        },
        en: {
          pageTitle: "Payment Confirmed | Norys",
          metaDescription: "Your payment has been confirmed and your Norys eBook is being prepared for download.",
          ogLocale: "en_US",
          ogTitle: "Payment Confirmed | Norys",
          ogDescription: "Your Norys payment has been confirmed.",
          brandAriaLabel: "Norys homepage",
          languageButtonAriaLabel: "Change language",
          languageLabel: "English",
          title: "Your payment has been confirmed.",
          preparing: "We are checking your order and preparing your eBook.",
          pleaseWait: "Please wait a moment...",
          missingSession: "The Stripe session is missing. Please go back to the result page and start the purchase again.",
          notPaidYet: "Your payment has not been confirmed yet. Please refresh the page again in a moment.",
          purchaseDone: "Your purchase is complete.",
          purchaseDoneFor: 'Your purchase of "{productName}" is complete.',
          downloadReady: "Your eBook is now ready to download.",
          downloadButton: "Download eBook",
          backLink: "Back to result page",
          fetchError: "There was an error retrieving your order.",
        },
      };

      const params = new URLSearchParams(window.location.search);
      const sessionId = params.get("session_id");
      const pageTitle = document.getElementById("pageTitle");
      const metaDescription = document.getElementById("metaDescription");
      const ogLocale = document.getElementById("ogLocale");
      const ogTitle = document.getElementById("ogTitle");
      const ogDescription = document.getElementById("ogDescription");
      const brandLink = document.getElementById("brandLink");
      const languageToggle = document.getElementById("languageToggle");
      const languageLabel = document.getElementById("languageLabel");
      const successTitle = document.getElementById("successTitle");
      const successCopy = document.getElementById("successCopy");
      const successStatus = document.getElementById("successStatus");
      const successActions = document.getElementById("successActions");
      const tracker = window.NorysTracker || null;
      let currentLanguage = getStoredLanguage();
      let latestData = null;

      function getStoredLanguage() {
        try {
          return window.localStorage.getItem(LANGUAGE_STORAGE_KEY) === "en" ? "en" : "de";
        } catch (_error) {
          return "de";
        }
      }

      function getUi() {
        return UI_TEXT[currentLanguage] || UI_TEXT.de;
      }

      function applyLanguage() {
        const ui = getUi();
        document.documentElement.lang = currentLanguage;
        document.title = ui.pageTitle;
        if (pageTitle) pageTitle.textContent = ui.pageTitle;
        if (metaDescription) metaDescription.setAttribute("content", ui.metaDescription);
        if (ogLocale) ogLocale.setAttribute("content", ui.ogLocale);
        if (ogTitle) ogTitle.setAttribute("content", ui.ogTitle);
        if (ogDescription) ogDescription.setAttribute("content", ui.ogDescription);
        if (brandLink) brandLink.setAttribute("aria-label", ui.brandAriaLabel);
        if (languageToggle) {
          languageToggle.setAttribute("aria-label", ui.languageButtonAriaLabel);
          languageToggle.setAttribute("aria-pressed", String(currentLanguage === "en"));
        }
        if (languageLabel) languageLabel.textContent = ui.languageLabel;
        if (successTitle) successTitle.textContent = ui.title;

        if (!latestData) {
          successCopy.textContent = ui.preparing;
          successStatus.textContent = sessionId ? ui.pleaseWait : ui.missingSession;
          successActions.innerHTML = "";
          return;
        }

        if (latestData.state === "pending") {
          successCopy.textContent = ui.preparing;
          successStatus.textContent = ui.notPaidYet;
          successActions.innerHTML = "";
          return;
        }

        if (latestData.state === "success") {
          successCopy.textContent = latestData.productName
            ? ui.purchaseDoneFor.replace("{productName}", latestData.productName)
            : ui.purchaseDone;
          successStatus.textContent = ui.downloadReady;
          successActions.innerHTML = `
            <a class="cta" href="${latestData.downloadUrl}">
              ${ui.downloadButton}
              <span class="cta__arrow" aria-hidden="true">
                <i class="fa-solid fa-arrow-right-long"></i>
              </span>
            </a>
            <a class="success-link" href="result.html">${ui.backLink}</a>
          `;

          const downloadButton = successActions.querySelector(".cta");
          if (downloadButton && tracker && latestData.orderId) {
            downloadButton.addEventListener("click", () => {
              tracker.pushDownloadButtonClicked(
                {
                  order_id: latestData.orderId,
                  payment_provider: "stripe",
                },
                latestData.quizSessionId || tracker.getQuizSessionId(),
              );
            }, { once: true });
          }
          return;
        }

        successStatus.textContent = latestData.error || ui.fetchError;
      }

      if (languageToggle) {
        languageToggle.addEventListener("click", () => {
          currentLanguage = currentLanguage === "en" ? "de" : "en";
          try {
            window.localStorage.setItem(LANGUAGE_STORAGE_KEY, currentLanguage);
          } catch (_error) {}
          applyLanguage();
        });
      }

      applyLanguage();

      if (!sessionId) {
        latestData = { state: "missing" };
        applyLanguage();
      } else {
        fetch(`/api/checkout-session?session_id=${encodeURIComponent(sessionId)}`)
          .then((response) => response.json())
          .then((data) => {
            if (data.error) {
              throw new Error(data.error);
            }

            if (data.paymentStatus !== "paid") {
              latestData = { state: "pending" };
              applyLanguage();
              return;
            }

            latestData = {
              state: "success",
              productName: data.productName,
              downloadUrl: data.downloadUrl,
              orderId: data.orderId || tracker?.getOrderId() || "",
              quizSessionId: tracker?.getQuizSessionId() || "",
            };
            if (tracker && latestData.orderId) {
              tracker.setCurrentOrder({
                order_id: latestData.orderId,
                payment_provider: "stripe",
              });
              tracker.pushDownloadPageOpened(
                {
                  order_id: latestData.orderId,
                  payment_provider: "stripe",
                },
                latestData.quizSessionId,
              );
            }
            applyLanguage();
          })
          .catch((error) => {
            latestData = { state: "error", error: error.message || getUi().fetchError };
            applyLanguage();
          });
      }
    </script>
  </body>
</html>
