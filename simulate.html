<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Analyse läuft | Norys</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link href="https://fonts.cdnfonts.com/css/hagrid-trial" rel="stylesheet" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
      referrerpolicy="no-referrer"
    />
    <link rel="stylesheet" href="assets/styles.css" />
    <link rel="stylesheet" href="simulate.css" />
  </head>
  <body>
    <header class="site-header">
      <div class="container header-shell">
        <a class="brand" href="index.html" aria-label="Norys Startseite">
          <img class="brand__logo" src="LogoTransparent.png" alt="Norys Logo" />
          <span class="brand__name">Norys</span>
        </a>

        <button class="lang-pill" type="button" aria-label="Sprache wählen">
          <i class="fa-solid fa-globe" aria-hidden="true"></i>
          <span>Deutsch</span>
        </button>
      </div>
    </header>

    <main class="simulate-page" aria-label="Analyse läuft">
      <section class="simulate-card">
        <p class="simulate-card__eyebrow">Analyse</p>
        <h1 class="simulate-card__title">Wir analysieren deine Antworten</h1>
        <p class="simulate-card__subtitle">Bitte einen kurzen Moment, wir berechnen dein individuelles Ergebnis.</p>

        <div class="simulate-progress" role="progressbar" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0">
          <div class="simulate-progress__fill" id="progressFill"></div>
        </div>

        <div class="simulate-meta">
          <p class="simulate-percent" id="progressPercent">0%</p>
          <p class="simulate-step" id="progressStep">Antwortmuster werden ausgewertet...</p>
        </div>
      </section>
    </main>

    <script src="simulate.js"></script>
  </body>
</html>
