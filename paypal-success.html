    <style>
      body { background: var(--bg); }
      .paypal-success-page {
        min-height: 100vh;
        padding: 118px 0 64px;
        display: flex;
        align-items: center;
      }
      .paypal-success-card {
        width: min(760px, calc(100% - 40px));
        margin: 0 auto;
        padding: 32px;
        border-radius: 24px;
        background: #f7e9dc;
        border: 1px solid rgba(17, 17, 17, 0.08);
        display: grid;
        gap: 18px;
      }
      .paypal-success-title {
        margin: 0;
        font-family: "Hagrid Trial", "Montserrat", sans-serif;
        font-size: clamp(2rem, 6vw, 3.3rem);
        line-height: 1.05;
      }
      .paypal-success-copy,
      .paypal-success-status {
        margin: 0;
        line-height: 1.6;
        color: rgba(17, 17, 17, 0.74);
      }
      .paypal-success-actions {
        display: flex;
        flex-direction: column;
        gap: 12px;
      }
      .paypal-success-link {
        color: var(--accent);
        font-weight: 700;
        text-decoration: none;
      }
    </style>

  <body>
    <!-- Google Tag Manager (noscript) -->
    <noscript><iframe src="https://www.googletagmanager.com/ns.html?id=GTM-KNJGK78M"
    height="0" width="0" style="display:none;visibility:hidden"></iframe></noscript>
    <!-- End Google Tag Manager (noscript) -->
    <header class="site-header">
      <div class="container header-shell">
        <a class="brand" id="brandLink" href="index.html" aria-label="Norys Startseite">
          <img class="brand__logo" src="LogoTransparent.png" alt="Norys Logo" />
          <span class="brand__name">Norys</span>
        </a>
        <button class="lang-pill" id="languageToggle" type="button" aria-label="Sprache wählen">
          <i class="fa-solid fa-globe" aria-hidden="true"></i>
          <span id="languageLabel">Deutsch</span>
        </button>
      </div>
    </header>

    <main class="paypal-success-page">
      <section class="paypal-success-card">
        <h1 class="paypal-success-title" id="paypalSuccessTitle">Deine PayPal Zahlung wird bestätigt.</h1>
        <p class="paypal-success-copy" id="paypalSuccessCopy">Wir prüfen gerade deine Bestellung und bereiten dein eBook vor.</p>
        <p class="paypal-success-status" id="paypalSuccessStatus">Einen Moment bitte...</p>
        <div class="paypal-success-actions" id="paypalSuccessActions"></div>
      </section>
    </main>

    <script src="assets/tracker.js"></script>
    <script>
      const LANGUAGE_STORAGE_KEY = "norysLanguage";
      const UI_TEXT = {
        de: {
          pageTitle: "PayPal Zahlung bestätigt | Norys",
          metaDescription: "Deine PayPal Zahlung wurde bestätigt und dein Norys eBook wird zum Download vorbereitet.",
          ogLocale: "de_DE",
          ogTitle: "PayPal Zahlung bestätigt | Norys",
          ogDescription: "Deine Norys PayPal Zahlung wurde bestätigt.",
          brandAriaLabel: "Norys Startseite",
          languageButtonAriaLabel: "Sprache wechseln",
          languageLabel: "Deutsch",
          title: "Deine PayPal Zahlung wird bestätigt.",
          preparing: "Wir prüfen gerade deine Bestellung und bereiten dein eBook vor.",
          pleaseWait: "Einen Moment bitte...",
          missingOrder: "Die PayPal Bestellung fehlt. Bitte starte den Kauf erneut.",
          purchaseDone: "Dein Kauf ist erfolgreich abgeschlossen.",
          purchaseDoneFor: 'Dein Kauf für "{productName}" ist erfolgreich abgeschlossen.',
          downloadReady: "Dein eBook steht jetzt zum Download bereit.",
          downloadButton: "eBook herunterladen",
          backLink: "Zurück zur eBook Seite",
          captureError: "PayPal Zahlung konnte nicht bestätigt werden.",
          orderReadError: "PayPal Bestellung konnte nicht gelesen werden.",
          fetchError: "Es ist ein Fehler bei der PayPal Bestätigung aufgetreten.",
        },
        en: {
          pageTitle: "PayPal Payment Confirmed | Norys",
          metaDescription: "Your PayPal payment has been confirmed and your Norys eBook is being prepared for download.",
          ogLocale: "en_US",
          ogTitle: "PayPal Payment Confirmed | Norys",
          ogDescription: "Your Norys PayPal payment has been confirmed.",
          brandAriaLabel: "Norys homepage",
          languageButtonAriaLabel: "Change language",
          languageLabel: "English",
          title: "Your PayPal payment is being confirmed.",
          preparing: "We are checking your order and preparing your eBook.",
          pleaseWait: "Please wait a moment...",
          missingOrder: "The PayPal order is missing. Please start the purchase again.",
          purchaseDone: "Your purchase is complete.",
          purchaseDoneFor: 'Your purchase of "{productName}" is complete.',
          downloadReady: "Your eBook is now ready to download.",
          downloadButton: "Download eBook",
          backLink: "Back to eBook page",
          captureError: "PayPal payment could not be confirmed.",
          orderReadError: "PayPal order could not be read.",
          fetchError: "There was an error confirming your PayPal payment.",
        },
      };

      const tracker = window.NorysTracker || null;
      const params = new URLSearchParams(window.location.search);
      const token = params.get("token");
      const pageTitle = document.getElementById("pageTitle");
      const metaDescription = document.getElementById("metaDescription");
      const ogLocale = document.getElementById("ogLocale");
      const ogTitle = document.getElementById("ogTitle");
      const ogDescription = document.getElementById("ogDescription");
      const brandLink = document.getElementById("brandLink");
      const languageToggle = document.getElementById("languageToggle");
      const languageLabel = document.getElementById("languageLabel");
      const paypalSuccessTitle = document.getElementById("paypalSuccessTitle");
      const paypalSuccessCopy = document.getElementById("paypalSuccessCopy");
      const paypalSuccessStatus = document.getElementById("paypalSuccessStatus");
      const paypalSuccessActions = document.getElementById("paypalSuccessActions");
      let currentLanguage = getStoredLanguage();
      let latestData = null;

      function getStoredLanguage() {
        try {
          return window.localStorage.getItem(LANGUAGE_STORAGE_KEY) === "en" ? "en" : "de";
        } catch (_error) {
          return "de";
        }
      }

      function getUi() {
        return UI_TEXT[currentLanguage] || UI_TEXT.de;
      }

      function applyLanguage() {
        const ui = getUi();
        document.documentElement.lang = currentLanguage;
        document.title = ui.pageTitle;
        if (pageTitle) pageTitle.textContent = ui.pageTitle;
        if (metaDescription) metaDescription.setAttribute("content", ui.metaDescription);
        if (ogLocale) ogLocale.setAttribute("content", ui.ogLocale);
        if (ogTitle) ogTitle.setAttribute("content", ui.ogTitle);
        if (ogDescription) ogDescription.setAttribute("content", ui.ogDescription);
        if (brandLink) brandLink.setAttribute("aria-label", ui.brandAriaLabel);
        if (languageToggle) {
          languageToggle.setAttribute("aria-label", ui.languageButtonAriaLabel);
          languageToggle.setAttribute("aria-pressed", String(currentLanguage === "en"));
        }
        if (languageLabel) languageLabel.textContent = ui.languageLabel;
        if (paypalSuccessTitle) paypalSuccessTitle.textContent = ui.title;

        if (!latestData) {
          paypalSuccessCopy.textContent = ui.preparing;
          paypalSuccessStatus.textContent = token ? ui.pleaseWait : ui.missingOrder;
          paypalSuccessActions.innerHTML = "";
          return;
        }

        if (latestData.state === "success") {
          paypalSuccessCopy.textContent = latestData.productName
            ? ui.purchaseDoneFor.replace("{productName}", latestData.productName)
            : ui.purchaseDone;
          paypalSuccessStatus.textContent = ui.downloadReady;
          paypalSuccessActions.innerHTML = `
            <a class="cta" href="${latestData.downloadUrl}">
              ${ui.downloadButton}
              <span class="cta__arrow" aria-hidden="true">
                <i class="fa-solid fa-arrow-right-long"></i>
              </span>
            </a>
            <a class="paypal-success-link" href="ebook.html">${ui.backLink}</a>
          `;
          const downloadButton = paypalSuccessActions.querySelector(".cta");
          if (downloadButton && tracker && latestData.orderId) {
            downloadButton.addEventListener(
              "click",
              () => {
                tracker.pushDownloadButtonClicked(
                  {
                    order_id: latestData.orderId,
                    payment_provider: "paypal",
                  },
                  latestData.quizSessionId || tracker.getQuizSessionId(),
                );
              },
              { once: true },
            );
          }
          return;
        }

        paypalSuccessStatus.textContent = latestData.error || ui.fetchError;
      }

      if (languageToggle) {
        languageToggle.addEventListener("click", () => {
          currentLanguage = currentLanguage === "en" ? "de" : "en";
          try {
            window.localStorage.setItem(LANGUAGE_STORAGE_KEY, currentLanguage);
          } catch (_error) {}
          applyLanguage();
        });
      }

      applyLanguage();

      async function run() {
        if (!token) {
          latestData = { state: "missing" };
          applyLanguage();
          return;
        }

        try {
          let statusData = await loadOrderStatus();

          if (!statusData.downloadUrl) {
            const captureResponse = await fetch("/api/paypal/capture-order", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ orderId: token }),
            });
            const captureData = await captureResponse.json();

            if (!captureResponse.ok) {
              throw new Error(captureData.error || getUi().captureError);
            }

            statusData = await loadOrderStatus();
          }

          latestData = {
            state: "success",
            productName: statusData.productName,
            downloadUrl: statusData.downloadUrl,
            orderId: statusData.referenceId || tracker?.getOrderId() || "",
            quizSessionId: tracker?.getQuizSessionId() || "",
          };
          if (tracker && latestData.orderId) {
            tracker.setCurrentOrder({
              order_id: latestData.orderId,
              payment_provider: "paypal",
            });
            tracker.pushDownloadPageOpened(
              {
                order_id: latestData.orderId,
                payment_provider: "paypal",
              },
              latestData.quizSessionId,
            );
          }
          applyLanguage();
        } catch (error) {
          latestData = { state: "error", error: error.message || getUi().fetchError };
          applyLanguage();
        }
      }

      async function loadOrderStatus() {
        const statusResponse = await fetch(`/api/paypal/order-status?order_id=${encodeURIComponent(token)}`);
        const statusData = await statusResponse.json();

        if (!statusResponse.ok) {
          throw new Error(statusData.error || getUi().orderReadError);
        }

        return statusData;
      }

      run();
    </script>
  </body>
</html>
